{% extends "core/base.html" %}
{% block title %}{{ about_page.title }}{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold">{{ about_page.title }}</h1>
                <p class="lead text-muted">آشنایی با زندگی، آثار و اندیشه‌های دکتر محمد رضا کمن</p>
            </div>
            <div class="card border-0 shadow-lg p-5 rounded-4">
                <div class="card-body">
                    {{ about_page.content|linebreaks }}
                </div>
            </div>
            <div class="text-center mt-4 text-muted small">
                آخرین بروزرسانی: {{ about_page.updated_at|date:"Y/m/d H:i" }}
            </div>
        </div>
    </div>
</div>
{% endblock %}
